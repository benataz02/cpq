# Minimal tuned config. Settings not listed fall back to compiled defaults;
# data_directory comes from the image's PGDATA env, hba/ident from PGDATA.
listen_addresses = '*'
max_connections = 100
shared_buffers = 256MB
effective_cache_size = 768MB
maintenance_work_mem = 128MB
work_mem = 16MB
wal_compression = on
random_page_cost = 1.1
effective_io_concurrency = 200
# pgvector HNSW index builds benefit from parallel maintenance workers
max_parallel_maintenance_workers = 2
