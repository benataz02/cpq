name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # reads packageManager (pnpm@10.33.4) from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck · lint · test · build
        run: pnpm turbo run typecheck lint test build

      - name: Security audit (informational)
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Forbidden dependency policy (hard gate)
        run: node scripts/check-forbidden-deps.mjs
